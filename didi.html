<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Didi 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* Background image */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('IMG-20250718-WA0001.jpg') no-repeat center;
  background-size: cover;
  filter: blur(3px);
  z-index: -1;
}

/* Popup */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: white;
  padding: 25px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.popup.active {
  transform: translate(-50%, -50%) scale(1);
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.yes { background: blue; color: white; }
.no { background: grey; }

</style>
</head>

<body>

<div class="bg"></div>

<div class="popup" id="popup">
  <h2 id="text">Kaisi hai chudail 😜</h2>
  <button class="yes" onclick="nextStep()">Yes</button>
  <button class="no" onclick="closePopup()">No</button>
</div>

<script>
let step = 1;

window.onload = () => {
  setTimeout(() => {
    document.getElementById("popup").classList.add("active");
  }, 1500);
};

function nextStep() {
  if(step === 1){
    document.getElementById("text").innerText = "Kuch special dekhigi 💙";
    step = 2;
  } else {
    document.getElementById("popup").innerHTML = `
      <h2>💙 Surprise 💙</h2>
      <p>I LOVE YOU DIDI 💙<br>I MISS YOU 💙</p>
    `;
  }
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
