<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Didi 💙</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(-45deg, #007BFF, #5DADE2, #3498DB, #85C1E9);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
  overflow: hidden;
}

/* Animated Gradient */
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Floating Hearts */
.heart {
  position: absolute;
  color: white;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(100vh) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.5);
    opacity: 0;
  }
}

.container {
  margin-top: 100px;
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  margin: 10px;
  cursor: pointer;
  background: white;
  color: #007BFF;
  font-weight: bold;
}
</style>
</head>

<body>

<script>
// Floating hearts generator
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💙";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 300);

// Popup flow
let first = confirm("Kaisi hai chudail 😜");

if(first){
  let second = confirm("Kuch special dekhigi? 💙");

  if(second){
    document.body.innerHTML += `
    <div class="container">
      <h1>💙 Mere Pyari Didi 💙</h1>

      <p>
      Tu sirf didi nahi, meri best friend hai,<br>
      Har problem ka tu hi ek end hai,<br>
      Kabhi daantti hai, kabhi hasa deti hai,<br>
      Sach bolu... tu meri life ki legend hai 💙
      </p>

      <p>
      Didi tu thodi si pagal hai, thodi si cute hai 😜  
      Kabhi mummy ki assistant, kabhi meri bodyguard hai 😎  
      Jab tu gussa hoti hai na, toh pura ghar hil jata hai  
      Par bina tere ghar bilkul silent mode pe chala jata hai 😂
      </p>

      <p>
      Sach bolu toh tu meri life ki sabse important person hai 💙  
      Tu hamesha support karti hai, chahe main kitna bhi stupid kaam karu  
      Aur haan… tu mujhe irritate bhi karti hai, par woh bhi pyaara lagta hai 😄  
      Kyuki tu hai toh hi life interesting hai!
      </p>

      <h2>💙 I LOVE YOU DIDI 💙</h2>
      <h3>I MISS YOU 💙</h3>
    </div>
    `;
  } else {
    alert("Theek hai... mood nahi hai lagta 😏");
  }
} else {
  alert("Attitude dekho zara 😒");
}
</script>

</body>
</html>
