<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Didi 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Slideshow */
.slideshow {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  animation: slideShow 12s infinite;
}

/* SAME IMAGE multiple times for smooth effect */
.slide:nth-child(1) { background-image: url('IMG-20250718-WA0001.jpg'); animation-delay: 0s; }
.slide:nth-child(2) { background-image: url('IMG-20250718-WA0001.jpg'); animation-delay: 4s; }
.slide:nth-child(3) { background-image: url('IMG-20250718-WA0001.jpg'); animation-delay: 8s; }

@keyframes slideShow {
  0% {opacity: 0;}
  10% {opacity: 1;}
  30% {opacity: 1;}
  40% {opacity: 0;}
  100% {opacity: 0;}
}

/* Popup */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: white;
  color: black;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.popup.active {
  transform: translate(-50%, -50%) scale(1);
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.yes { background: #007BFF; color: white; }
.no { background: #ccc; }

</style>
</head>

<body>

<!-- Slideshow -->
<div class="slideshow">
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
  <h2 id="text">Kaisi hai chudail 😜</h2>
  <button class="yes" onclick="nextStep()">Yes</button>
  <button class="no" onclick="closePopup()">No</button>
</div>

<script>
let step = 1;

window.onload = () => {
  setTimeout(() => {
    document.getElementById("popup").classList.add("active");
  }, 1500);
};

function nextStep() {
  if(step === 1){
    document.getElementById("text").innerText = "Kuch special dekhigi 💙";
    step = 2;
  } else {
    document.getElementById("popup").innerHTML = `
      <h2>💙 Surprise 💙</h2>
      <p>I LOVE YOU DIDI 💙<br>I MISS YOU 💙</p>
    `;
  }
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
